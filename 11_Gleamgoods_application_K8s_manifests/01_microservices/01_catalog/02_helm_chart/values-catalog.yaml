# ============================================================================
# CATALOG SERVICE - CUSTOM VALUES
# ============================================================================

# ----------------------------------------------------------------------------
# IMAGE CONFIGURATION
# ----------------------------------------------------------------------------
image:
  repository: 564956047797.dkr.ecr.us-east-1.amazonaws.com/gleamgoods/catalog
  pullPolicy: IfNotPresent
  tag: latest
# ----------------------------------------------------------------------------
# DATABASE CONFIGURATION
# ----------------------------------------------------------------------------
mysql:
  create: false  # Using external AWS RDS MySQL database

app:
  persistence:
    provider: mysql
    endpoint: "mydb3.cipcmuog8z8q.us-east-1.rds.amazonaws.com"
    database: "catalogdb"

    secret:
      create: false  # ← CRITICAL: Don't create static secret
      name: catalog-db
      username: ""  # Not used when useSecretsManager=true
      password: ""  # Not used when useSecretsManager=true
      
      useSecretsManager: true  # Enable Secrets Manager
      secretsManager:
        secretName: "gleamgoods-db-secret"
        region: "us-east-1"      

# ----------------------------------------------------------------------------
# RESOURCE MANAGEMENT
# ----------------------------------------------------------------------------
resources:
  limits:
    cpu: 512m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi
    
# ----------------------------------------------------------------------------
# AUTOSCALING - HORIZONTAL POD AUTOSCALER (HPA)
# ----------------------------------------------------------------------------
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# ----------------------------------------------------------------------------
# KARPENTER NODE SELECTION
# ----------------------------------------------------------------------------
# Schedule pods on Karpenter On-Demand nodes for stability
nodeSelector:
  karpenter.sh/capacity-type: spot

# ----------------------------------------------------------------------------
# TOPOLOGY SPREAD CONSTRAINTS
# ----------------------------------------------------------------------------
# Distribute pods across nodes AND availability zones for high availability
topologySpreadConstraints:
  # Spread across nodes (within same AZ) - Best effort
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: catalog
        app.kubernetes.io/component: service
        app.kubernetes.io/instance: catalog
  
  # Spread across availability zones - Strict requirement
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: catalog
        app.kubernetes.io/component: service
        app.kubernetes.io/instance: catalog

# ----------------------------------------------------------------------------
# POD DISRUPTION BUDGET (PDB)
# ----------------------------------------------------------------------------
# Maintain minimum availability during voluntary disruptions (node drains, etc.)
podDisruptionBudget:
  enabled: true
  minAvailable: 2      # At least 2 pods must remain available
  maxUnavailable: 0    # Maximum 1 pod can be unavailable at a time


opentelemetry:
  enabled: true
  instrumentation: "default-instrumentation"  