name: "TF-02_VPC"

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - "02_VPC/**"

jobs:
  plan:
    name: "Terraform Plan (02_VPC)"
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      AWS_REGION: us-east-1
    defaults:
      run:
        working-directory: 02_VPC
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.12.2
          terraform_wrapper: false

      - name: Check Terraform version
        run: terraform version

      - name: Validate AWS credentials
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "AWS credentials are missing. Set AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY in repo secrets.";
            exit 1;
          fi
          echo "AWS credentials appear present."

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=plan.tfplan -no-color

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-02-vpc
          path: 02_VPC/plan.tfplan

  apply:
    name: "Terraform Apply (02_VPC)"
    needs: plan
    runs-on: ubuntu-latest
    environment:
      name: 02-VPC-Apply
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      AWS_REGION: us-east-1
    defaults:
      run:
        working-directory: 02_VPC
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-02-vpc
          path: .

      - name: Locate and move plan file
        run: |
          set -e
          echo "Searching for plan.tfplan under $GITHUB_WORKSPACE"
          PLAN_PATH=$(find "$GITHUB_WORKSPACE" -type f -name 'plan.tfplan' | head -n 1 || true)
          if [ -z "$PLAN_PATH" ]; then
            echo "No plan.tfplan found. Listing workspace for debugging:";
            ls -al "$GITHUB_WORKSPACE" || true;
            ls -al . || true;
            exit 1;
          fi
          echo "Found plan at: $PLAN_PATH"
          mv "$PLAN_PATH" ./plan.tfplan
          echo "Moved plan to $(pwd)/plan.tfplan"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.12.2
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve plan.tfplan
