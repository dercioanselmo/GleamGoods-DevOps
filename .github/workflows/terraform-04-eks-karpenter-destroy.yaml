name: "TF-04_EKS_Karpenter-Manual-Destroy"

permissions:
  id-token: write
  contents: read
  issues: write

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm running terraform destroy'
        required: true
        default: 'no'

jobs:
  destroy:
    name: "Manual Terraform Destroy (04_EKS_Karpenter)"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'destroy' }}
    environment:
      name: 04-EKS-Karpenter-Apply
    env:
      AWS_REGION: us-east-1
    defaults:
      run:
        working-directory: 04_EKS_Karpenter
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::564956047797:role/github-actions-terraform-role-gleamgoods-devops
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.12.2
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy (confirmed)
        run: terraform destroy -auto-approve

      - name: "Notify: create issue about destroy"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = `Terraform destroy executed for 04_EKS_Karpenter by ${context.actor}`;
            const body = `@dercioanselmo\n\nUser @${context.actor} ran a manual Terraform destroy on 04_EKS_Karpenter on ref ${context.ref}.\n\nRun: ${process.env.GITHUB_SERVER_URL}/${owner}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.issues.create({ owner, repo, title, body, assignees: ['dercioanselmo'] });
